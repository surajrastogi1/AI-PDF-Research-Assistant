name: Full-Stack CI & Docker Push

on:
  push:
    branches: [ "main" ]

jobs:
  # 🧪 JOB 1: Test the Backend code
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-mock
        if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi

    - name: Run Tests with Pytest
      env:
        PYTHONPATH: backend
        GEMINI_API_KEY: "fake_key_for_testing"
      run: |
        pytest backend/tests/ -v -W ignore

  # 🐳 JOB 2: Build & Push BOTH Backend and Frontend Images
  push-to-registry:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 1. Set up Docker Buildx (unlocks caching layers)
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 2. Log into Docker Hub using secrets
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 3. Build & Push Backend Image
    - name: Build and Push Backend
      uses: docker/build-push-action@v6
      with:
        context: ./backend
        file: ./backend/Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/researchmind-backend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    # 4. Build & Push Frontend Image
    - name: Build and Push Frontend
      uses: docker/build-push-action@v6
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/researchmind-frontend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max